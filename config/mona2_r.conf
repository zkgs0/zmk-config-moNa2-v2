#Mouse config ---------------------
# CONFIG_PMW3610_INVERT_X=y
# CONFIG_PMW3610_INVERT_Y=y
# CONFIG_PMW3610_SWAP_XY=y
# CONFIG_PMW3610_REPORT_INTERVAL_MIN=12
# CONFIG_PMW3610_LOG_LEVEL_DBG=y
# CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=300 // <--see Troubleshooting

#Encoder config -------------------
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

#Battery config -------------------
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

#Layer LED config -------------------
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

#ZMK Studio config -------------------
CONFIG_ZMK_STUDIO=y
# 現keymapに &studio_unlock が無いためロック無効で運用（有効化するならキー配置とセットで）
CONFIG_ZMK_STUDIO_LOCKING=n

#DYA Studio modules ------------------
# Settings RPC (注: サブフラグは _STUDIO_RPC ではなく _STUDIO)
CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SETTINGS_RPC_STUDIO=y

# Battery History は無効 (使わない)
# CONFIG_ZMK_BATTERY_HISTORY=y
# CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=y

# BLE Management
CONFIG_ZMK_BLE_MANAGEMENT=y
CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=y

# Runtime Input Processor (トラックボール用)
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR=y
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR_STUDIO_RPC=y

# Runtime Sensor Rotate (エンコーダ用)
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE=y
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE_STUDIO_RPC=y

#Bluetooth config -------------------
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# ── BLE slot config (DYA Studio: Studio + hosts + split peripheral 用に拡張) ──
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ── USB polling rate ──
CONFIG_USB_HID_POLL_INTERVAL_MS=1

#Prospector Scanner (status advertisement) -------------------
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="moNa2"
CONFIG_ZMK_STATUS_ADV_CENTRAL_SIDE="RIGHT"
